name: Test Build Publish

on:
  workflow_dispatch:

jobs:
  test-build-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Bump patch version
        id: bump_version
        shell: bash
        run: |
          npm version patch --no-git-tag-version
          npm pkg get version | tr -d '"' | awk '{ print "version=" $0 }' >> "$GITHUB_OUTPUT"

      - name: Validate npm token placeholder
        env:
          # Replace secret name below with your actual npm token secret name.
          # Example: secrets.NPM_TOKEN
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "Missing npm token secret."
            echo "Set GitHub Actions secret: NPM_TOKEN"
            exit 1
          fi

      - name: Pre-publish checks (auth, ownership, version)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          NPM_USER="$(npm whoami)"
          PKG_NAME="$(npm pkg get name | tr -d '"')"
          PKG_VERSION="$(npm pkg get version | tr -d '"')"

          echo "npm account: ${NPM_USER}"
          echo "target package: ${PKG_NAME}@${PKG_VERSION}"

          if npm view "${PKG_NAME}" version >/dev/null 2>&1; then
            MAINTAINERS_JSON="$(npm view "${PKG_NAME}" maintainers --json 2>/dev/null || echo "[]")"
            if ! printf "%s" "${MAINTAINERS_JSON}" | node -e '
              const fs = require("fs");
              const input = fs.readFileSync(0, "utf8").trim();
              const user = process.argv[1];
              let data = [];
              if (input) {
                try {
                  data = JSON.parse(input);
                } catch {
                  data = [];
                }
              }
              const maintainers = Array.isArray(data) ? data : [data];
              const hasAccess = maintainers.some((m) => m && m.name === user);
              process.exit(hasAccess ? 0 : 1);
            ' "${NPM_USER}"; then
              echo "No publish permission for package '${PKG_NAME}' with npm user '${NPM_USER}'."
              echo "Use a package name you own (for example a scoped name like @${NPM_USER}/${PKG_NAME})."
              exit 1
            fi
          else
            echo "Package '${PKG_NAME}' does not exist yet. First publish path will be used."
          fi

          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "Version '${PKG_VERSION}' already exists for '${PKG_NAME}'."
            echo "Please bump version before publish."
            exit 1
          fi

      - name: Publish to npm
        env:
          # Replace secret name below with your actual npm token secret name.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.version }} [skip ci]"
          git push
